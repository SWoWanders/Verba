<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verba — Words & Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --dark: #0a0a0a;
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Josefin Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }

  /* ── BACKGROUND LAYERS ── */
  #bg-a, #bg-b {
    position: fixed; inset: 0;
    background-size: cover;
    background-position: center;
    will-change: opacity;
    transition: opacity 1s ease;
  }
  #bg-b { opacity: 0; }

  /* Dark overlay always on top of both */
  #overlay {
    position: fixed; inset: 0; z-index: 2;
    background: linear-gradient(
      160deg,
      rgba(0,0,0,0.62) 0%,
      rgba(0,0,0,0.28) 45%,
      rgba(0,0,0,0.70) 100%
    );
    pointer-events: none;
  }

  /* Grain */
  #grain {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    opacity: 0.045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 150px 150px;
  }

  /* ── APP SHELL ── */
  #app {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    padding: 18px 22px 0;
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-shrink: 0;
  }
  #logo {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 24px;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-shadow: 0 2px 14px rgba(0,0,0,0.7);
  }
  #art-credit {
    font-size: 10px;
    color: rgba(255,255,255,0.42);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: right;
    max-width: 58%;
    line-height: 1.5;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    padding-top: 3px;
  }

  /* ── CATEGORY PILLS ── */
  #cat-scroll {
    flex-shrink: 0;
    padding: 14px 18px 0;
    overflow-x: auto; overflow-y: hidden;
    white-space: nowrap;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  #cat-scroll::-webkit-scrollbar { display: none; }

  .pill {
    display: inline-flex; align-items: center;
    padding: 6px 15px;
    margin-right: 7px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.7);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.22s;
    user-select: none;
  }
  .pill.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
  }

  /* ── QUOTE ZONE ── */
  #quote-zone {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 30px 8px;
  }

  #quote-wrap {
    max-width: 460px; width: 100%;
    text-align: center;
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  #quote-wrap.out {
    opacity: 0;
    transform: translateY(14px);
  }

  .open-mark {
    font-family: 'Playfair Display', serif;
    font-size: 90px;
    line-height: 0.35;
    color: var(--gold);
    opacity: 0.65;
    display: block;
    margin-bottom: 10px;
    text-shadow: 0 4px 22px rgba(0,0,0,0.5);
    user-select: none;
  }
  .close-mark {
    font-family: 'Playfair Display', serif;
    font-size: 90px;
    line-height: 0.35;
    color: var(--gold);
    opacity: 0.65;
    display: block;
    margin-top: 10px;
    text-align: right;
    text-shadow: 0 4px 22px rgba(0,0,0,0.5);
    user-select: none;
  }
  #q-text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(21px, 5.5vw, 33px);
    line-height: 1.55;
    color: #fff;
    text-shadow: 0 2px 22px rgba(0,0,0,0.75), 0 1px 5px rgba(0,0,0,0.9);
    letter-spacing: 0.01em;
  }
  #q-rule {
    width: 38px; height: 1px;
    background: var(--gold);
    opacity: 0.65;
    margin: 18px auto 16px;
  }
  #q-author {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 12.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-light);
    text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  }
  #q-source {
    margin-top: 6px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    text-shadow: 0 1px 5px rgba(0,0,0,0.8);
  }

  /* swipe hint */
  #hint {
    text-align: center;
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    padding: 6px 0 2px;
    transition: opacity 1.2s;
    flex-shrink: 0;
  }

  /* ── CONTROLS ── */
  #controls {
    flex-shrink: 0;
    padding: 8px 18px 30px;
    display: flex; gap: 10px; align-items: center; justify-content: center;
  }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    border: none; cursor: pointer;
    font-family: 'Josefin Sans', sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: transform 0.15s, background 0.2s;
    border-radius: 30px;
    touch-action: manipulation;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.93); }

  #btn-shuffle {
    flex: 1; max-width: 195px;
    padding: 15px 20px;
    background: var(--gold);
    color: #000;
    font-size: 12.5px;
    box-shadow: 0 4px 26px rgba(201,168,76,0.38);
  }
  #btn-art, #btn-save {
    padding: 15px 16px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.17);
    color: rgba(255,255,255,0.82);
    font-size: 11.5px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .ico { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 110px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(18,18,18,0.92);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.9);
    padding: 9px 20px;
    border-radius: 30px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    transition: all 0.28s;
    z-index: 99;
    white-space: nowrap;
    backdrop-filter: blur(14px);
  }
  #toast.on {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

  <div id="controls">

      Save
    </button>
  </div>
</div>

<div id="toast"></div>

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let currentCat = 'all';
let currentQuote = null;
let currentBg = null;  // { type: 'gradient'|'artwork', data: ... }
let activeLayer = 'a'; // which bg div is currently showing
let transitioning = false;
let hintGone = false;
let touchX = 0, touchY = 0;

const bgA = document.getElementById('bg-a');
const bgB = document.getElementById('bg-b');
const artCredit = document.getElementById('art-credit');
const qWrap = document.getElementById('quote-wrap');
const qText = document.getElementById('q-text');
const qAuthor = document.getElementById('q-author');
const qSource = document.getElementById('q-source');
const hint = document.getElementById('hint');
const toast = document.getElementById('toast');

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function otherLayer() { return activeLayer === 'a' ? 'b' : 'a'; }
function getEl(layer) { return layer === 'a' ? bgA : bgB; }

function filteredQuotes() {
  return currentCat === 'all' ? QUOTES : QUOTES.filter(q => q.c === currentCat);
}

// ── SET BACKGROUND ── (cross-fade between layers)
function applyBackground(bg) {
  const next = otherLayer();
  const nextEl = getEl(next);
  const currEl = getEl(activeLayer);

  if (bg.type === 'gradient') {
    nextEl.style.backgroundImage = bg.data.css;
    artCredit.textContent = '';
  } else {
    nextEl.style.backgroundImage = `url('${bg.data.url}')`;
    artCredit.textContent = `${bg.data.title} · ${bg.data.artist} · ${bg.data.year}`;
  }

  // Fade in next, fade out current
  nextEl.style.opacity = 1;
  currEl.style.opacity = 0;
  activeLayer = next;
  currentBg = bg;
}

// Pick a random gradient immediately
function pickGradient(exclude) {
  const pool = exclude ? GRADIENTS.filter(g => g !== exclude.data) : GRADIENTS;
  return { type: 'gradient', data: rand(pool) };
}

// Try to load a real artwork; fallback to gradient on error/timeout
function pickArtwork(exclude, onDone) {
  const pool = exclude && exclude.type === 'artwork'
    ? ARTWORKS.filter(a => a !== exclude.data)
    : [...ARTWORKS];
  if (!pool.length) { onDone(pickGradient(exclude)); return; }

  const art = rand(pool);
  let settled = false;

  function finish(result) {
    if (settled) return;
    settled = true;
    clearTimeout(timer);
    onDone(result);
  }

  const img = new Image();
  // CRITICAL: set handlers before setting src
  img.onload  = () => finish({ type: 'artwork', data: art });
  img.onerror = () => finish(pickGradient(exclude));

  // 6-second timeout — mobile networks can be slow
  const timer = setTimeout(() => {
    img.src = ''; // abort
    finish(pickGradient(exclude));
  }, 6000);

  img.src = art.url;
}

// ── SHOW QUOTE ──
function showQuote(q, animate = true) {
  if (animate) {
    qWrap.classList.add('out');
    setTimeout(() => {
      qText.textContent = q.t;
      qAuthor.textContent = q.a;
      qSource.textContent = q.s;
      currentQuote = q;
      qWrap.classList.remove('out');
    }, 460);
  } else {
    qText.textContent = q.t;
    qAuthor.textContent = q.a;
    qSource.textContent = q.s;
    currentQuote = q;
  }
}

function hideHint() {
  if (!hintGone) { hint.style.opacity = 0; hintGone = true; }
}

function showToast(msg, dur = 2800) {
  toast.textContent = msg;
  toast.classList.add('on');
  setTimeout(() => toast.classList.remove('on'), dur);
}

// ── SHUFFLE (quote + art) ──
function shuffle() {
  if (transitioning) return;
  transitioning = true;
  hideHint();

  const pool = filteredQuotes();
  const q = rand(pool.filter(x => x !== currentQuote)) || rand(pool);
  showQuote(q);

  // Release UI lock after 1s regardless — art will apply when ready
  setTimeout(() => { transitioning = false; }, 1000);

  pickArtwork(currentBg, bg => {
    applyBackground(bg);
  });
}

// ── NEW ART ONLY ──
function newArt() {
  if (transitioning) return;
  transitioning = true;
  hideHint();

  setTimeout(() => { transitioning = false; }, 1000);

  pickArtwork(currentBg, bg => {
    applyBackground(bg);
  });
}

// ── NEW QUOTE ONLY ──
function newQuote() {
  if (transitioning) return;
  hideHint();
  const pool = filteredQuotes();
  const q = rand(pool.filter(x => x !== currentQuote)) || rand(pool);
  showQuote(q);
}

// ── SAVE ──
async function saveImage() {
  if (!currentQuote) return;
  showToast('Preparing…', 6000);

  const W = 1080, H = 1350;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const drawOnCanvas = (imgEl) => {
    // Background
    if (imgEl) {
      const r = imgEl.naturalWidth / imgEl.naturalHeight;
      let sx=0, sy=0, sw=imgEl.naturalWidth, sh=imgEl.naturalHeight;
      if (r > W/H) { sw = imgEl.naturalHeight*(W/H); sx=(imgEl.naturalWidth-sw)/2; }
      else { sh = imgEl.naturalWidth*(H/W); sy=(imgEl.naturalHeight-sh)/2; }
      ctx.drawImage(imgEl, sx, sy, sw, sh, 0, 0, W, H);
    } else if (currentBg && currentBg.type === 'gradient') {
      // Paint gradient
      const g = ctx.createLinearGradient(0, 0, W, H);
      // simple dark fallback
      g.addColorStop(0, '#1a1a2e');
      g.addColorStop(1, '#0a0a0a');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // Overlay
    const ov = ctx.createLinearGradient(0,0,0,H);
    ov.addColorStop(0, 'rgba(0,0,0,0.58)');
    ov.addColorStop(0.4, 'rgba(0,0,0,0.28)');
    ov.addColorStop(1, 'rgba(0,0,0,0.72)');
    ctx.fillStyle = ov;
    ctx.fillRect(0, 0, W, H);

    // Open quote
    ctx.font = 'italic 200px Georgia,serif';
    ctx.fillStyle = 'rgba(201,168,76,0.65)';
    ctx.textAlign = 'center';
    ctx.fillText('\u201C', W/2, H*0.31);

    // Quote text
    const fs = Math.max(44, Math.min(70, 3800/currentQuote.t.length));
    ctx.font = `italic 300 ${fs}px Georgia,serif`;
    ctx.fillStyle = '#ffffff';
    wrapCanvas(ctx, currentQuote.t, W/2, H*0.41, W-160, fs*1.55);

    // Rule
    const ry = H*0.72;
    ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2-60, ry); ctx.lineTo(W/2+60, ry); ctx.stroke();

    // Author
    ctx.font = '300 30px Helvetica,Arial,sans-serif';
    ctx.fillStyle = '#e8cc7a';
    ctx.fillText(currentQuote.a.toUpperCase(), W/2, ry+52);

    // Source
    ctx.font = 'italic 22px Georgia,serif';
    ctx.fillStyle = 'rgba(255,255,255,0.42)';
    ctx.fillText(currentQuote.s, W/2, ry+92);

    // Art credit
    if (currentBg && currentBg.type === 'artwork') {
      ctx.font = '20px Helvetica,Arial,sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.32)';
      ctx.fillText(`${currentBg.data.title} · ${currentBg.data.artist}`, W/2, H-56);
    }

    // App watermark
    ctx.font = 'italic 26px Georgia,serif';
    ctx.fillStyle = 'rgba(201,168,76,0.45)';
    ctx.fillText('Verba', W/2, H-26);

    try {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `verba-${Date.now()}.jpg`;
        a.click(); URL.revokeObjectURL(url);
        showToast('Saved!');
      }, 'image/jpeg', 0.93);
    } catch(e) {
      showToast('CORS blocked — try a different artwork');
    }
  };

  if (currentBg && currentBg.type === 'artwork') {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => drawOnCanvas(img);
    img.onerror = () => drawOnCanvas(null);
    img.src = currentBg.data.url;
  } else {
    drawOnCanvas(null);
  }
}

function wrapCanvas(ctx, text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '', ly = y;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line.trim(), x, ly);
      line = words[i] + ' '; ly += lh;
    } else { line = test; }
  }
  ctx.fillText(line.trim(), x, ly);
}

// ── CATEGORY PILLS ──
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentCat = p.dataset.cat;
    const pool = filteredQuotes();
    if (pool.length) showQuote(rand(pool));
  });
});

// ── BUTTONS ──
document.getElementById('btn-shuffle').addEventListener('click', shuffle);
document.getElementById('btn-art').addEventListener('click', newArt);
document.getElementById('btn-save').addEventListener('click', saveImage);

// ── SWIPE ──
document.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if (ax < 25 && ay < 25) return; // tap

  if (ay > ax && dy < -35) {
    newArt(); // swipe up
  } else if (ax > ay && ax > 35) {
    newQuote(); // swipe left or right
  }
}, { passive: true });

// ── INIT — instant, no blocking ──
(function init() {
  // Show a quote immediately
  const q = rand(QUOTES);
  showQuote(q, false);

  // Start with a gradient instantly — no network wait
  const firstGrad = pickGradient(null);
  applyBackground(firstGrad);

  // Then try to load a real painting in the background
  pickArtwork(firstGrad, bg => {
    applyBackground(bg);
  });
})();
</script>
