<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verba — Artwork Test</title>
<style>
  body { background: #111; color: #fff; font-family: sans-serif; padding: 16px; }
  h1 { color: #c9a84c; margin-bottom: 4px; }
  p { color: #888; font-size: 13px; margin-bottom: 20px; }
  #summary { background: #222; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; line-height: 1.8; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 2px solid #333; }
  .card.ok  { border-color: #2d6a2d; }
  .card.err { border-color: #6a2d2d; }
  .card img { width: 100%; height: 120px; object-fit: cover; display: block; }
  .card .info { padding: 6px 8px; font-size: 11px; line-height: 1.4; }
  .card .status { font-weight: bold; }
  .ok  .status { color: #6fcf6f; }
  .err .status { color: #cf6f6f; }
  .card .title { color: #ccc; }
  .card .id { color: #666; font-size: 10px; word-break: break-all; }
</style>
</head>
<body>
<h1>Verba — Artwork Test</h1>
<p>Testing all 20 AIC image IDs. Green = loaded OK, Red = failed. Open from GitHub Pages, not Claude preview.</p>
<div id="summary">Testing… 0 / 20</div>
<div class="grid" id="grid"></div>

<script>
const ARTWORKS = [
  {id:"25c31d8d-21a4-9ea1-1d73-6a2eca4dda7e", title:"A Sunday on La Grande Jatte", artist:"Georges Seurat"},
  {id:"831a05de-d3f6-f4fa-a460-23008dd58dda", title:"Nighthawks", artist:"Edward Hopper"},
  {id:"5c800592-4a05-9bcb-5cfd-e4e2fc85e81d", title:"American Gothic", artist:"Grant Wood"},
  {id:"2d484387-2509-5e8e-2c43-22f9981972eb", title:"The Bedroom", artist:"Vincent van Gogh"},
  {id:"d8e3b9ef-49da-38de-c0ce-b31b50d86edb", title:"Stacks of Wheat", artist:"Claude Monet"},
  {id:"e966799b-97c4-5a74-0c1c-df7a65c12b74", title:"Paris Street; Rainy Day", artist:"Gustave Caillebotte"},
  {id:"a6b1cdb3-accf-e571-1a5e-af0d2f3fc7e9", title:"At the Moulin Rouge", artist:"Toulouse-Lautrec"},
  {id:"1adf2696-8489-499b-cad2-821d7fde4b33", title:"The Child's Bath", artist:"Mary Cassatt"},
  {id:"b0a69104-8eca-a737-b571-f86db8e5988d", title:"Water Lily Pond", artist:"Claude Monet"},
  {id:"0cd2b78e-2a1d-e60e-23b1-f48a4b4ab4c2", title:"The Herring Net", artist:"Winslow Homer"},
  {id:"3c27b499-af56-f0d5-93b5-a7f2f1ad5813", title:"Two Sisters", artist:"Pierre-Auguste Renoir"},
  {id:"f4b48608-e9ee-5421-59b3-39f3f0a5d515", title:"The Old Guitarist", artist:"Pablo Picasso"},
  {id:"aa57fadf-4b4e-18bb-d2a3-f72ccf2f17dc", title:"Haystacks", artist:"Claude Monet"},
  {id:"c2b5c132-e702-4d90-7451-52e0fa26a9a1", title:"Young Girl Reading", artist:"Jean-Honoré Fragonard"},
  {id:"4da2e8f0-b28a-e491-e7fd-cc45b5e01b08", title:"The Assumption of the Virgin", artist:"El Greco"},
  {id:"93b81d84-3956-ee4a-8b1c-a3f3e6dc4085", title:"Bathers at Asnières", artist:"Georges Seurat"},
  {id:"dd2d3ef5-a4b9-dcea-39e0-ea4a88f4de21", title:"Landscape with Cattlemen", artist:"Claude Lorrain"},
  {id:"96ade9b8-e018-9ab0-3b50-19d54d7f3b33", title:"Landscape with Saint John", artist:"Nicolas Poussin"},
  {id:"48fd2c57-0a70-ea89-ebfc-b95ff9fd0823", title:"The Annunciation", artist:"El Greco"},
  {id:"bde9c2f6-3b65-09e5-f6e1-5a7e27994c8e", title:"Self-Portrait", artist:"Gustave Courbet"},
];

const grid = document.getElementById('grid');
const summary = document.getElementById('summary');
let done = 0, ok = 0, failed = 0;

function update() {
  summary.innerHTML = `Tested: ${done} / ${ARTWORKS.length} &nbsp;|&nbsp; <span style="color:#6fcf6f">✓ ${ok} working</span> &nbsp;|&nbsp; <span style="color:#cf6f6f">✗ ${failed} failed</span>`;
}

ARTWORKS.forEach(work => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img id="img-${work.id.slice(0,8)}" />
    <div class="info">
      <div class="status" id="st-${work.id.slice(0,8)}">Loading…</div>
      <div class="title">${work.title}</div>
      <div class="title" style="color:#999">${work.artist}</div>
      <div class="id">${work.id}</div>
    </div>`;
  grid.appendChild(card);

  const img = card.querySelector('img');
  const st = card.querySelector('.status');

  img.onload = () => {
    card.classList.add('ok');
    st.textContent = '✓ OK';
    done++; ok++;
    update();
  };
  img.onerror = () => {
    card.classList.add('err');
    st.textContent = '✗ Failed';
    img.style.background = '#2a1a1a';
    img.style.height = '40px';
    done++; failed++;
    update();
  };
  img.src = `https://www.artic.edu/iiif/2/${work.id}/full/400,/0/default.jpg`;
});
</script>
</body>
</html>
